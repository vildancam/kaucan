services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      KAU_LLM_PROVIDER: ollama
      KAU_CRAWL_SCOPE: faculty
      KAU_REQUEST_DELAY: "0.8"
      KAU_RATE_LIMIT_WAIT: "75"
      KAU_MAX_PAGES: "1000"
      KAU_REFRESH_ON_START: "true"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    entrypoint: /bin/sh
    command: -c "sleep 5 && ollama pull $$OLLAMA_MODEL"
    depends_on:
      - ollama
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
