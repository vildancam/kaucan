services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      KAU_LLM_PROVIDER: ollama
      KAU_CRAWL_SCOPE: faculty
      KAU_REQUEST_DELAY: "0.8"
      KAU_RATE_LIMIT_WAIT: "75"
      KAU_MAX_RETRIES: "3"
      KAU_MAX_PAGES: "1000"
      KAU_REFRESH_ON_START: "true"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_TIMEOUT: "180"
    volumes:
      - kaucan-data:/app/data
      - kaucan-logs:/app/logs
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    entrypoint: /bin/sh
    command: -c "sleep 8 && ollama pull $$OLLAMA_MODEL"
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama:/root/.ollama

volumes:
  kaucan-data:
  kaucan-logs:
  ollama:
